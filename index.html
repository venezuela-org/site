<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Conexión RedJIV</title>
<meta name="description" id="metaDesc" content="Red de jóvenes investigadores venezolanos que ayuda tras los terremotos del 24 de junio de 2026."/>
<meta name="theme-color" content="#C6772A"/>
<meta property="og:type" content="website"/>
<meta property="og:title" content="Conexión RedJIV"/>
<meta property="og:description" content="Un hackathon de largo plazo para ayudar a Venezuela. Perfil bajo, resultados útiles."/>
<meta property="og:url" content="https://venezuela-org.github.io/plan/"/>
<meta property="og:image" content="https://venezuela-org.github.io/plan/img/portada.jpg"/>
<meta name="twitter:card" content="summary_large_image"/>
<meta name="twitter:title" content="Conexión RedJIV"/>
<meta name="twitter:description" content="Un hackathon de largo plazo para ayudar a Venezuela. Perfil bajo, resultados útiles."/>
<link rel="preconnect" href="https://fonts.googleapis.com"><link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&family=Space+Mono:wght@400;700&family=Spline+Sans:wght@400;500;600&display=swap" rel="stylesheet">
<style>
:root{
 --paper:#FBF6EE;--paper2:#F4ECE0;--ink:#241F19;--muted:#5A5344;--faint:#7A7260;--line:#E3D8C6;
 --amber:#B26914;--amber-soft:#F3E0C8;--teal:#137563;--teal-soft:#D9EFE8;
 --display:"Space Grotesk",-apple-system,system-ui,sans-serif;--body:"Spline Sans",-apple-system,system-ui,sans-serif;--mono:"Space Mono",ui-monospace,monospace;
}
*{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--paper);color:var(--ink);font-family:var(--body);line-height:1.6;font-size:16.5px;overflow-x:hidden}
a{color:var(--teal)}
img,svg{max-width:100%}
:focus-visible{outline:3px solid var(--teal);outline-offset:2px;border-radius:6px}
.wrap{max-width:1080px;margin:0 auto;padding:0 20px}
.mono{font-family:var(--mono);text-transform:uppercase;letter-spacing:.12em;font-size:.64rem}
.skip{position:absolute;left:-999px}.skip:focus{left:8px;top:8px;position:fixed;z-index:200;background:var(--ink);color:#fff;padding:8px 12px;border-radius:8px}

.top{position:sticky;top:0;z-index:60;background:rgba(251,246,238,.94);backdrop-filter:blur(10px);border-bottom:1px solid var(--line)}
.top .in{max-width:1080px;margin:0 auto;padding:10px 20px;display:flex;align-items:center;gap:12px;position:relative}
.brand{font-family:var(--display);font-weight:600;font-size:1rem;cursor:pointer;letter-spacing:-.01em;background:none;border:0;color:inherit}
.brand .dot{display:inline-block;width:8px;height:8px;border-radius:50%;background:var(--amber);margin-right:8px;vertical-align:middle}
.sp{flex:1}
.actions{display:flex;align-items:center;gap:8px}
.tbtn{font-family:var(--mono);font-size:.62rem;letter-spacing:.09em;text-transform:uppercase;border:1px solid var(--line);background:rgba(255,255,255,.6);color:var(--muted);border-radius:999px;padding:8px 12px;cursor:pointer;transition:.15s;text-decoration:none;display:inline-block}
.tbtn:hover{border-color:var(--amber);color:var(--ink)}
.tbtn.on{background:var(--ink);color:var(--paper);border-color:var(--ink)}
.tbtn.discord{border-color:var(--teal);color:var(--teal)}
.tbtn.discord:hover{background:var(--teal);color:#fff}
.lang{display:flex;gap:4px}
.mnav{display:none;flex-direction:column;gap:2px;border-top:1px solid var(--line);margin-top:4px;padding-top:8px}
.mnav a{padding:9px 8px;border-radius:8px;text-decoration:none;color:var(--muted);font-size:.95rem}
.mnav a:hover{background:var(--paper2);color:var(--ink)}
.menu-btn{display:none}

section{padding:44px 0}
#situacion,#origen,#how,#principios,#arcband,#tracks,#ecosistema,#d30,#wont,#momo,#support,#reader{scroll-margin-top:64px}
.stitle{font-family:var(--display);font-weight:700;font-size:clamp(1.55rem,4vw,2.3rem);letter-spacing:-.015em}
.center{text-align:center}
.ssub{color:var(--muted);margin-top:8px;max-width:52ch}
.center .ssub{margin-left:auto;margin-right:auto}
.slabel{font-family:var(--mono);font-size:.62rem;letter-spacing:.13em;text-transform:uppercase;color:var(--faint)}

.hero{position:relative;overflow:hidden;padding:52px 0 36px}
#field{position:absolute;inset:0;width:100%;height:100%;z-index:0;opacity:.75}
.hero .glow{position:absolute;border-radius:50%;filter:blur(90px);z-index:0;opacity:.4;pointer-events:none}
.hero .g1{width:340px;height:340px;background:var(--amber-soft);top:-120px;left:-60px}
.hero .g2{width:380px;height:380px;background:var(--teal-soft);bottom:-160px;right:-70px}
.hero .in{position:relative;z-index:2}
.kicker{color:var(--amber);font-family:var(--mono);font-size:.66rem;letter-spacing:.14em;text-transform:uppercase}
.hero h1{font-family:var(--display);font-weight:700;font-size:clamp(2rem,5.4vw,3.4rem);line-height:1.05;letter-spacing:-.02em;margin:14px 0 0;max-width:18ch}
.hero .sub{font-size:clamp(1rem,2.2vw,1.2rem);color:var(--muted);margin:16px 0 0;max-width:56ch}
.ctas{display:flex;flex-wrap:wrap;gap:10px;margin-top:24px}
.btn{font-family:var(--body);font-weight:600;font-size:.95rem;border-radius:999px;padding:12px 20px;cursor:pointer;text-decoration:none;border:1px solid var(--line);background:#fff;color:var(--ink);transition:.15s}
.btn:hover{border-color:var(--amber)}
.btn.primary{background:var(--amber);color:#fff;border-color:var(--amber);box-shadow:0 8px 22px rgba(178,105,20,.22)}
.btn.primary:hover{background:#98570f}
.imgslot{position:relative;border-radius:18px;overflow:hidden;border:1px solid var(--line);background:var(--paper2);margin:0}
.imgslot img{width:100%;height:100%;display:none;object-fit:cover}
.imgslot.has-photo img{display:block}
.imgslot.has-photo .art{display:none}
.imgslot .art{width:100%;height:100%}
.imgslot .art svg{width:100%;height:100%;display:block}
.hero-img{margin-top:28px;aspect-ratio:21/9}

.snap{border:1px solid var(--line);border-left:4px solid var(--amber);background:#fff;border-radius:14px;padding:20px 22px}
.snap .head{display:flex;flex-wrap:wrap;gap:10px;align-items:baseline;justify-content:space-between}
.snap h2{font-family:var(--display);font-weight:600;font-size:1.2rem}
.snap .asof{font-family:var(--mono);font-size:.58rem;letter-spacing:.06em;text-transform:uppercase;color:var(--faint)}
.snap p{margin-top:10px;color:var(--ink)}
.snap .warn{margin-top:10px;font-size:.92rem;color:var(--muted)}
.snap .src{margin-top:10px;font-size:.82rem;color:var(--faint)}
.snap .src a{color:var(--teal);margin-right:10px;word-break:break-word}

.flow{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(220px,100%),1fr));gap:14px;margin-top:22px}
.step{background:#fff;border:1px solid var(--line);border-radius:16px;padding:18px}
.step .n{width:34px;height:34px;border-radius:10px;background:var(--amber);color:#fff;font-family:var(--display);font-weight:700;display:flex;align-items:center;justify-content:center}
.step p{margin-top:12px;font-size:.96rem}

.arcband{background:var(--paper2);border-top:1px solid var(--line);border-bottom:1px solid var(--line)}
.arc{display:grid;grid-template-columns:repeat(4,1fr);margin-top:24px;position:relative}
.arc::before{content:"";position:absolute;left:8%;right:8%;top:22px;height:3px;background:linear-gradient(90deg,var(--amber),var(--teal));border-radius:3px;z-index:0}
.phase{text-align:center;padding:0 10px;position:relative;z-index:1}
.phase .dot{width:16px;height:16px;border-radius:50%;background:var(--paper2);border:3px solid var(--amber);margin:14px auto 0}
.phase:last-child .dot{border-color:var(--teal)}
.phase .w{font-family:var(--display);font-weight:600;font-size:1.02rem;margin-top:12px}
.phase .t{color:var(--muted);font-size:.9rem;margin-top:5px}
.arcnote{text-align:center;color:var(--faint);font-family:var(--mono);font-size:.62rem;letter-spacing:.07em;text-transform:uppercase;margin-top:24px}

.tracks{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(260px,100%),1fr));gap:14px;margin-top:22px}
.tcard{background:#fff;border:1px solid var(--line);border-radius:18px;padding:20px;text-align:left}
.tcard .head{display:flex;align-items:center;gap:12px}
.tcard .letter{width:42px;height:42px;border-radius:12px;background:var(--amber-soft);color:var(--amber);font-family:var(--display);font-weight:700;font-size:1.2rem;display:flex;align-items:center;justify-content:center}
.tcard.e .letter{background:var(--teal-soft);color:var(--teal)}
.tcard h3{font-family:var(--display);font-weight:600;font-size:1.12rem}
.tcard .b{color:var(--muted);font-size:.95rem;margin-top:10px}
.badge{display:inline-block;margin-top:12px;font-family:var(--mono);font-size:.56rem;letter-spacing:.06em;text-transform:uppercase;padding:5px 9px;border-radius:999px}
.badge.go{background:var(--teal-soft);color:var(--teal)}
.badge.wait{background:#F0E3D0;color:#8a6a2a}

.list{list-style:none;margin-top:18px;max-width:60ch}
.list li{position:relative;padding-left:26px;margin-bottom:10px}
.list li::before{content:"";position:absolute;left:4px;top:.6em;width:8px;height:8px;border-radius:50%;background:var(--teal)}
.list.no li::before{background:var(--amber);border-radius:2px}

.momo{max-width:720px;margin:0 auto;text-align:center;background:var(--ink);color:var(--paper);border-radius:20px;padding:32px 28px}
.momo h2{font-family:var(--display);font-weight:700;font-size:1.4rem}
.momo p{color:#EADFC9;margin-top:12px}

.cards2{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(260px,100%),1fr));gap:14px;margin-top:22px}
.slidecard{background:#fff;border:1px solid var(--line);border-radius:16px;overflow:hidden;display:flex;flex-direction:column}
.slidecard .thumb{aspect-ratio:16/9;background:linear-gradient(135deg,var(--teal-soft),var(--amber-soft));display:flex;align-items:center;justify-content:center;color:var(--teal)}
.slidecard .thumb svg{width:46px;height:46px}
.slidecard .body{padding:16px}
.slidecard h3{font-family:var(--display);font-weight:600;font-size:1.05rem}
.slidecard a.open{display:inline-block;margin-top:10px;font-family:var(--mono);font-size:.62rem;letter-spacing:.08em;text-transform:uppercase;color:var(--teal)}
.snote{color:var(--faint);font-size:.84rem;margin-top:14px;text-align:center}

.support .sgrid{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(220px,100%),1fr));gap:12px;margin-top:20px}
.support .schip{background:#fff;border:1px solid var(--line);border-radius:14px;padding:16px;font-weight:500}
.chips{display:flex;flex-wrap:wrap;gap:8px;margin-top:18px}
.chip{background:#fff;border:1px solid var(--line);border-radius:999px;padding:8px 14px;font-size:.86rem;color:var(--muted)}
.princ{display:grid;grid-template-columns:repeat(auto-fit,minmax(min(260px,100%),1fr));gap:14px;margin-top:22px}
.pcard{background:#fff;border:1px solid var(--line);border-radius:18px;padding:20px}
.pcard h3{font-family:var(--display);font-weight:600;font-size:1.08rem;display:flex;align-items:center;gap:10px}
.pcard h3 .d{width:10px;height:10px;border-radius:50%;background:var(--amber);flex:0 0 auto}
.pcard .b{color:var(--muted);font-size:.95rem;margin-top:8px}
.pcard .a{color:var(--faint);font-size:.86rem;font-style:italic;margin-top:8px}

.reader{background:var(--paper2);border-top:1px solid var(--line)}
.reader-in{max-width:820px;margin:0 auto;padding:52px 20px 40px}
.reader h2.rt{font-family:var(--display);font-weight:700;font-size:1.7rem;text-align:center}
.rhint{text-align:center;color:var(--faint);font-size:.9rem;margin-top:6px}
.docwrap{background:var(--paper);border:1px solid var(--line);border-radius:18px;padding:28px;margin-top:22px}
.content h1{font-family:var(--display);font-weight:700;font-size:clamp(1.5rem,3.4vw,2rem);line-height:1.1;letter-spacing:-.02em;margin:0 0 6px}
.content h2{font-family:var(--display);font-weight:600;font-size:1.25rem;margin:24px 0 8px;padding-top:16px;border-top:1px solid var(--line)}
.content p{margin:0 0 12px;max-width:70ch}
.content ul{margin:6px 0 14px;list-style:none}
.content li{position:relative;padding-left:22px;margin-bottom:7px;max-width:70ch}
.content li::before{content:"";position:absolute;left:3px;top:.62em;width:6px;height:6px;border-radius:50%;background:var(--amber)}
.content strong{font-weight:600}
.content a{color:var(--teal);word-break:break-word}

.foot{text-align:center;padding:40px 20px 64px;color:var(--faint)}
.foot .f{font-family:var(--display);color:var(--ink);font-weight:600}
.foot .mono2{display:block;margin-top:6px;font-family:var(--mono);font-size:.56rem;letter-spacing:.09em;text-transform:uppercase}
.footlinks{margin-top:14px;font-size:.86rem;display:flex;flex-direction:column;gap:4px}
.footlinks a{color:var(--teal)}
.foot-ai{display:block;margin-top:12px;font-family:var(--mono);font-size:.55rem;letter-spacing:.06em;text-transform:uppercase;color:var(--faint);max-width:56ch;margin-left:auto;margin-right:auto}
.printall{display:none}


/* --- situation dispatch --- */
.snap .notemer{margin-top:12px;font-weight:600;color:var(--ink);background:var(--amber-soft);border:1px solid #EBD3AE;border-radius:10px;padding:10px 14px}
.sitrows{margin-top:16px;display:grid;gap:14px}
.sitrow{border-top:1px solid var(--line);padding-top:13px}
.sitrow:first-child{border-top:0;padding-top:0}
.sitrow .sl{font-family:var(--mono);font-size:.6rem;letter-spacing:.11em;text-transform:uppercase;color:var(--amber)}
.sitrow .st{margin-top:6px;color:var(--ink)}
.sitrow .ss{margin-top:6px;font-size:.8rem}
.sitrow .ss a{color:var(--teal);word-break:break-word;margin-right:6px}
/* --- signature accent under section titles --- */
.stitle::after{content:"";display:block;width:46px;height:3px;background:linear-gradient(90deg,var(--amber),var(--teal));border-radius:3px;margin-top:16px}
.stitle.center::after{margin-left:auto;margin-right:auto}
/* --- depth + hover on cards --- */
.tcard,.pcard,.step,.snap{box-shadow:0 1px 2px rgba(36,31,25,.04),0 8px 24px rgba(36,31,25,.05)}
.tcard,.pcard,.step,.schip{transition:transform .18s ease,box-shadow .18s ease,border-color .18s ease}
.tcard:hover,.pcard:hover,.step:hover{transform:translateY(-3px);box-shadow:0 6px 14px rgba(36,31,25,.07),0 18px 40px rgba(36,31,25,.10);border-color:var(--amber)}
.schip:hover{border-color:var(--teal);transform:translateY(-2px)}
.btn,.tbtn{transition:transform .15s ease,background .15s ease,border-color .15s ease,color .15s ease}
.btn:hover{transform:translateY(-2px)}
/* --- hero refinement --- */
.hero h1{font-weight:700;letter-spacing:-.025em}
.kicker{display:inline-flex;align-items:center;gap:10px}
.kicker::before{content:"";width:26px;height:2px;background:var(--amber);display:inline-block}
.hero-img{box-shadow:0 10px 40px rgba(36,31,25,.10)}
/* --- origen: faint seismic-ring signature --- */
#origen{position:relative;overflow:hidden}
#origen .wrap{position:relative;z-index:1}
#origen::before{content:"";position:absolute;right:-140px;top:-90px;width:440px;height:440px;pointer-events:none;background:radial-gradient(circle, transparent 29%, rgba(19,117,99,.07) 30%, transparent 32%, transparent 44%, rgba(178,105,20,.07) 45%, transparent 47%, transparent 59%, rgba(19,117,99,.05) 60%, transparent 62%, transparent 74%, rgba(178,105,20,.045) 75%, transparent 77%)}
/* --- scroll reveal --- */
.js-reveal .reveal{opacity:0;transform:translateY(16px);transition:opacity .6s ease,transform .6s ease}
.js-reveal .reveal.in{opacity:1;transform:none}

@media(max-width:820px){
 .arc{grid-template-columns:1fr;gap:22px;position:relative}
 .arc::before{display:none}
 .arc::after{content:"";position:absolute;left:9px;top:6px;bottom:6px;width:2px;background:linear-gradient(var(--amber),var(--teal))}
 .phase{text-align:left;position:relative;padding-left:34px}
 .phase .dot{position:absolute;left:2px;top:5px;margin:0}
 .menu-btn{display:inline-flex}
 .actions{position:absolute;top:calc(100% + 6px);right:12px;left:12px;flex-direction:column;align-items:stretch;gap:10px;background:var(--paper);border:1px solid var(--line);border-radius:16px;padding:14px;display:none;box-shadow:0 16px 40px rgba(36,31,25,.16);z-index:70}
 body.menu-open .actions{display:flex}
 .actions .lang{justify-content:center}
 .actions .tbtn{width:100%;text-align:center}
 .mnav{display:flex}
 .hero-img{aspect-ratio:16/9}
}
@media(prefers-reduced-motion:reduce){ #field{display:none} *{transition:none!important;animation:none!important;scroll-behavior:auto!important} }
@media print{
 .top,#field,.hero .glow,.ctas,.menu-btn,.foot .discord,.slidecard,.snote{display:none!important}
 .hero,#origen,#how,#principios,.arcband,#tracks,#ecosistema,#d30,#wont,#momo,#support{display:none!important}
 .reader{background:#fff;border:0}.docwrap{border:0;padding:0}#reader-view{display:none!important}
 .printall{display:block!important}.printall .content{max-width:100%}
 body{font-size:11pt;background:#fff}
}
</style>
</head>
<body>
<a class="skip" href="#reader">Saltar al plan</a>

<div class="top"><div class="in">
 <button class="brand" id="brandHome"><span class="dot"></span>Conexión RedJIV</button>
 <span class="sp"></span>
 <div class="actions" id="actions" aria-label="Acciones">
  <div class="lang" role="group" aria-label="Idioma"><button class="tbtn on" id="bes" aria-label="Español">ES</button><button class="tbtn" id="ben" aria-label="English">EN</button></div>
  <a class="tbtn" id="planBtn" href="#reader"></a>
  <a class="tbtn" id="supBtn" href="#support"></a>
  <a class="tbtn discord" id="discBtn" href="#" target="_blank" rel="noopener">Discord</a>
  <button class="tbtn" id="printBtn"></button>
  <nav class="mnav" id="mnav" aria-label="Secciones"></nav>
 </div>
 <button class="tbtn menu-btn" id="menuBtn" aria-label="Menú" aria-expanded="false">&#9776;</button>
</div></div>

<header class="hero"><canvas id="field" aria-hidden="true"></canvas><div class="glow g1"></div><div class="glow g2"></div>
 <div class="wrap in">
  <div class="kicker" id="h-kick"></div>
  <h1 id="h-title"></h1>
  <p class="sub" id="h-sub"></p>
  <div class="ctas">
   <a class="btn primary" id="cta-join" href="#" target="_blank" rel="noopener"></a>
   <a class="btn" id="cta-plan" href="#reader"></a>
   <a class="btn" id="cta-support" href="#support"></a>
  </div>
  <figure class="imgslot hero-img" data-src="img/portada.jpg"><img id="img-hero" alt=""><div class="art"><svg viewBox="0 0 840 340" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid slice" role="img" aria-label="Red científica latinoamericana sobre un globo"><defs><linearGradient id="pg" x1="0" y1="0" x2="0" y2="1"><stop offset="0" stop-color="#F7EEE0"/><stop offset="1" stop-color="#F0E3D0"/></linearGradient><radialGradient id="glow" cx="70%" cy="52%" r="55%"><stop offset="0" stop-color="#F0CE92" stop-opacity=".5"/><stop offset="1" stop-color="#F0E3D0" stop-opacity="0"/></radialGradient><clipPath id="gc"><circle cx="600" cy="170" r="120"/></clipPath></defs><rect width="840" height="340" fill="url(#pg)"/><rect width="840" height="340" fill="url(#glow)"/><g stroke="#C6772A" stroke-width="1.3" opacity=".5"><line x1="70" y1="120" x2="180" y2="200"/><line x1="180" y1="200" x2="120" y2="280"/><line x1="180" y1="200" x2="300" y2="150"/><line x1="300" y1="150" x2="420" y2="210"/><line x1="420" y1="210" x2="480" y2="140"/></g><g><circle cx="70" cy="120" r="6" fill="#1E8A78"/><circle cx="180" cy="200" r="7" fill="#C6772A"/><circle cx="120" cy="280" r="5" fill="#1E8A78"/><circle cx="300" cy="150" r="6" fill="#C6772A"/><circle cx="420" cy="210" r="6" fill="#1E8A78"/><circle cx="480" cy="140" r="5" fill="#C6772A"/></g><circle cx="600" cy="170" r="120" fill="#1E8A78" opacity=".10"/><g clip-path="url(#gc)" stroke="#1E8A78" stroke-width="1.5" fill="none" opacity=".55"><ellipse cx="600" cy="170" rx="120" ry="40"/><ellipse cx="600" cy="170" rx="120" ry="80"/><ellipse cx="600" cy="170" rx="40" ry="120"/><ellipse cx="600" cy="170" rx="80" ry="120"/><line x1="480" y1="170" x2="720" y2="170"/></g><path d="M500 236 C 560 208, 640 208, 700 246" fill="none" stroke="#3FB0C9" stroke-width="4" stroke-linecap="round" opacity=".85"/><circle cx="600" cy="170" r="120" fill="none" stroke="#1E8A78" stroke-width="2"/><ellipse cx="600" cy="170" rx="165" ry="66" fill="none" stroke="#C6772A" stroke-width="2" opacity=".7"/><circle cx="435" cy="170" r="7" fill="#C6772A"/><circle cx="765" cy="170" r="7" fill="#1E8A78"/><circle cx="600" cy="104" r="6" fill="#3FB0C9"/></svg></div></figure>
 </div>
</header>

<section id="situacion"><div class="wrap">

<script>
var PUBDOC={"es": "# Conexión RedJIV · Plan público\n\nDocumento público y seguro. No incluye nombres de personas dentro de Venezuela, ubicaciones, ni detalles operativos internos.\n\n## Qué es\n\nLa reacción de una red de jóvenes investigadores venezolanos, dentro y fuera del país, a los terremotos del 24 de junio de 2026. Ponemos talento y conocimiento a producir cosas útiles a distancia, canalizando todo a través de organismos ya establecidos. No hacemos rescate ni improvisamos en la zona.\n\n## Perfil bajo por diseño\n\nNo buscamos figurar. El crédito es de quien hace el trabajo. Trabajar en silencio también protege a quienes están dentro del país.\n\n## De dónde viene\n\nConexión RedJIV no empieza de cero. Nace del mismo espíritu de CoAfina y del hackathon de datos abiertos de LA-CoNGA: convertir datos abiertos en soluciones que transformen realidades, resolviendo retos científicos y educativos en comunidad. Esta es su edición de emergencia, el mismo modelo puesto al servicio de la respuesta y la reconstrucción.\n\n## El modelo: un hackathon de largo plazo\n\nCorremos el esfuerzo como una edición de emergencia de CoAfina, un hackathon de datos abiertos de América Latina, adaptado: no dura un fin de semana, dura hasta ayudar a reconstruir. Los encuentros de la red son los sprints: 10 de julio, 24 de julio y 7 de agosto.\n\n## Los tracks\n\n- A Mapa de necesidades y accesos: ver dónde falta ayuda y cómo llegar, con datos abiertos.\n- B Tierra segura: riesgo de réplicas y criterios de sitio seguro.\n- C Agua limpia: guía de agua segura y saneamiento para refugios.\n- D Salud y ánimo: cuidado de la salud y apoyo psicosocial.\n- E La base: une, coordina y sostiene a los demás.\n- F Ecosistema y datos: ordenar, verificar y conectar las plataformas que ya existen, sin duplicar datos sensibles.\n\n## Arranque realista\n\nEmpezamos con E, A, C y F. El track D arranca cuando estén listas las salvaguardas de privacidad y ética. El track B arranca si los especialistas de geociencias confirman disponibilidad y datos. Cada track tiene un primer entregable que se puede hacer a distancia.\n\n## Qué entregaremos en 30 días\n\n- Una base viva de coordinación y datos.\n- Una guía de agua segura lista para imprimir y repartir.\n- Un primer mapa reproducible de vacíos de cobertura, hecho con datos abiertos.\n\n## El incentivo\n\nMás que un premio: que el esfuerzo cuente y no se apague. Salir como primer autor, tener mentoría y recursos, y darle continuidad al trabajo. El reconocimiento en efectivo es secundario y va atado a entregables, no a inscribirse.\n\n## Cómo sumarte\n\nEscribe por el canal de la comunidad (Discord) y dinos en qué track puedes aportar y cuántas horas. Cada quien entra donde de verdad puede ayudar.\n\n## Cómo apoyar\n\nAyuda que suma: créditos de cómputo, mentoría científica y técnica, alianzas institucionales y difusión responsable. Todo se canaliza con perfil bajo y a través de organismos establecidos.\n\n## Lo que nos hace distintos\n\n- Perfil bajo por diseño. El crédito es de quien hace el trabajo, y el silencio también protege a quien está dentro del país.\n- No duplicar, conectar. No hacemos otra plataforma más; ordenamos, verificamos y conectamos lo que ya existe.\n- Utilidad antes que ruido. Entregables que sirven, no anuncios.\n- Abierto y verificable. Datos abiertos, código con DOI y fuentes citadas.\n- Autoría para el joven investigador. Primer autor, con mentoría y continuidad.\n- A través de organismos establecidos. OCHA, UNICEF, CICR y protección civil. No improvisamos en la zona.\n\n## Lo que no haremos\n\n- No improvisamos en la zona del desastre.\n- No publicamos datos de pacientes ni de víctimas.\n- No exponemos la ubicación de personas vulnerables.\n- No exponemos a los miembros que están dentro de Venezuela.\n\n## Ecosistema digital de emergencia: no duplicar, conectar mejor\n\nYa existen varias plataformas ciudadanas para búsqueda de personas, hospitales, heridos, reunificación de niños, ayuda, apoyo psicológico, mapas de daños e información en tiempo real. Nuestra contribución no será crear ruido ni duplicar registros sensibles, sino ayudar a ordenar, verificar, documentar, conectar y proteger mejor ese ecosistema.\n\nEste proyecto no reemplaza a los servicios de emergencia, los hospitales, Protección Civil ni los registros oficiales. Para una emergencia, usa siempre los canales oficiales. Empieza por los canales establecidos: el CICR y la Cruz Roja para reconectar familiares (familylinks.icrc.org), y UNICEF y OCHA para niñez y coordinación.\n\nLas plataformas ciudadanas son de terceros, no oficiales y no verificadas por nosotros. En desastres circulan sitios falsos que imitan nombres reales, así que verifica el dominio antes de entrar y no compartas datos sensibles si no estás seguro. No copiamos ni reproducimos nombres, cédulas, fotos, ubicaciones de hospitales ni datos de menores. Para la reunificación de niños hace falta verificación presencial y procedimientos de protección infantil.\n\n## Licencia y créditos\n\nContenido bajo CC BY-SA 4.0, atribuido a Conexión RedJIV, con el apoyo de Creative Commons Venezuela. Las ilustraciones son originales, hechas con asistencia de IA; no se usan imágenes de terceros.\n", "en": "# Conexión RedJIV · Public plan\n\nPublic, safe document. It does not include names of people inside Venezuela, locations, or internal operational details.\n\n## What it is\n\nThe response of a network of young Venezuelan researchers, inside and outside the country, to the earthquakes of June 24, 2026. We put talent and knowledge to work remotely on useful things, channeling everything through already-established bodies. We do not do rescue or improvise in the zone.\n\n## Low profile by design\n\nWe do not seek the spotlight. Credit belongs to whoever does the work. Working quietly also protects those inside the country.\n\n## Where it comes from\n\nConexión RedJIV does not start from scratch. It grows from the spirit of CoAfina and the LA-CoNGA open-data hackathon: turning open data into solutions that transform realities, solving scientific and educational challenges as a community. This is its emergency edition, the same model put to work for response and reconstruction.\n\n## The model: a long-term hackathon\n\nWe run the effort as an emergency edition of CoAfina, a Latin American open-data hackathon, adapted: it does not last a weekend, it lasts until we help rebuild. The network's meetings are the sprints: July 10, July 24 and August 7.\n\n## The tracks\n\n- A Needs and access map: see where help is missing and how to get there, with open data.\n- B Safe ground: aftershock risk and safe-siting criteria.\n- C Clean water: safe-water and sanitation guide for shelters.\n- D Health and spirit: health care and psychosocial support.\n- E The backbone: connects, coordinates and holds up the rest.\n- F Ecosystem and data: order, verify and connect the platforms that already exist, without duplicating sensitive data.\n\n## A realistic start\n\nWe begin with E, A, C and F. Track D starts once privacy and ethics safeguards are ready. Track B starts if geoscience specialists confirm availability and data. Each track has a first deliverable that can be done remotely.\n\n## What we will deliver in 30 days\n\n- A live coordination and data backbone.\n- A safe-water guide ready to print and hand out.\n- A first reproducible coverage-gap map, built from open data.\n\n## The incentive\n\nMore than a prize: that the effort counts and does not fade. Being first author, having mentorship and resources, and giving the work continuity. Cash recognition is secondary and tied to deliverables, not to signing up.\n\n## How to join\n\nReach out through the community channel (Discord) and tell us which track you can contribute to and how many hours. Each person joins where they can truly help.\n\n## How to support\n\nHelp that adds up: compute credits, scientific and technical mentorship, institutional partnerships and responsible outreach. Everything is channeled with a low profile and through established bodies.\n\n## What makes us different\n\n- Low profile by design. Credit belongs to whoever does the work, and quiet also protects those inside the country.\n- Do not duplicate, connect. We do not build yet another platform; we order, verify and connect what already exists.\n- Usefulness before noise. Deliverables that help, not announcements.\n- Open and verifiable. Open data, code with a DOI and cited sources.\n- Authorship for the young researcher. First author, with mentorship and continuity.\n- Through established bodies. OCHA, UNICEF, the ICRC and civil protection. We do not improvise in the zone.\n\n## What we will not do\n\n- We do not improvise in the disaster zone.\n- We do not publish patient or victim data.\n- We do not expose the location of vulnerable people.\n- We do not expose members inside Venezuela.\n\n## Emergency digital ecosystem: do not duplicate, connect better\n\nSeveral citizen platforms already exist for finding people, hospitals, injured people, child reunification, aid, psychological support, damage maps and real-time information. Our contribution will not be to add noise or duplicate sensitive registries, but to help order, verify, document, connect and better protect that ecosystem.\n\nThis project does not replace emergency services, hospitals, civil protection or official registries. In an emergency, always use official channels. Start with established ones: the ICRC and the Red Cross to reconnect families (familylinks.icrc.org), and UNICEF and OCHA for children and coordination.\n\nThe citizen platforms are third-party, unofficial and not verified by us. In disasters, fake sites that imitate real names circulate, so verify the domain before entering and do not share sensitive data if you are unsure. We do not copy or reproduce names, IDs, photos, hospital locations or children's data. Child reunification requires in-person verification and child-protection procedures.\n\n## License and credits\n\nContent under CC BY-SA 4.0, attributed to Conexión RedJIV, supported by Creative Commons Venezuela. Illustrations are original, made with AI assistance; no third-party images are used.\n"}, PUB={"es": {"metaDesc": "Red de jóvenes investigadores venezolanos que ayuda tras los terremotos del 24 de junio de 2026. Un hackathon de largo plazo, perfil bajo, resultados útiles.", "hero": {"kicker": "Un hackathon de largo plazo · Conexión RedJIV", "title": "El conocimiento no se fue. Sigue aquí, conectado.", "sub": "Científicos venezolanos, dentro y fuera del país, ayudando tras los terremotos del 24 de junio. Perfil bajo. Resultados útiles."}, "ctaJoin": "Sumarse", "ctaPlan": "Leer el plan", "ctaSupport": "Apoyar", "discordLabel": "Discord", "printLabel": "Imprimir / PDF", "sitTitle": "Situación", "sitAsOf": "Actualizado 4 jul 2026", "sitNotEmergency": "Esto no es un servicio de emergencia. Para una emergencia, usa los canales oficiales.", "sitWarn": "Las cifras son preliminares, varían según la fuente y cambian a diario. Si no hay una fuente exacta y fechada, trátalas como aproximadas.", "sitRows": [{"label": "El evento", "text": "Doble terremoto de magnitud 7,2 y 7,5, con 39 segundos de diferencia, el 24 de junio de 2026. Epicentro en el municipio Veroes (Yaracuy), al oeste de San Felipe. Cientos de réplicas y riesgo de nuevas. Fuente sísmica: USGS.", "src": [{"t": "USGS, vía ABC News, 3 jul 2026", "u": "https://abcnews.com/International/venezuela-earthquakes-latest-50000-unaccounted-death-toll-climbs/story?id=134386173"}]}, {"label": "Necesidad humanitaria", "text": "Cerca de 1,8 millones de personas necesitan asistencia, 680.000 de ellas niños.", "src": [{"t": "ONU, UNICEF y OCHA, 29 jun 2026", "u": "https://news.un.org/en/story/2026/06/1167837"}]}, {"label": "Cifras (preliminares y en disputa)", "text": "Al 2 de julio, la presidenta encargada citó al menos 2.595 fallecidos, unos 12.400 heridos y cerca de 50.000 personas s
